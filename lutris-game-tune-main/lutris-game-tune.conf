# /etc/lutris-game-tune.conf
#
# Human-readable configuration file for lutris-game-tune. The script reads
# this file SAFELY (no source — only the KEY=VALUE lines in the whitelist
# below are accepted). Unknown keys and invalid lines are silently ignored
# (with a warning logged).
#
# This file must be owned by root:root and must not be group/other writable
# (e.g. 644 or 640). Otherwise the script ignores it completely.
#
# Changes take effect on the next PRE run — no need to rebuild/reinstall.

# --- CPU Governor / EPP ------------------------------------------------------
SET_CPU_GOVERNOR=1
CPU_GOVERNOR=performance

# --- PCIe ASPM ----------------------------------------------------------------
SET_ASPM=1
ASPM_POLICY=performance

# --- Deep C-state disabling (optional, may increase power/heat) -------------
DISABLE_DEEP_CSTATES=0
CSTATE_KEEP_MAX=1

# --- VM ------------------------------------------------------------------------
VM_SWAPPINESS=10

# --- CCD/CCX core isolation ----------------------------------------------------
# Note: THP settings (enabled/shmem_enabled/defrag) are INTENTIONALLY absent
# here — all three are always hardcoded to "always" in the script and are not
# configurable.

# Enable (1) or fully disable (0) CCD isolation. If disabled, the script
# never does topology detection and never touches any cgroups.
CCD_ISOLATION_ENABLED=1

# LEGACY, no longer used by the current architecture: the script now
# constrains EXISTING cgroups in place (writes their cpuset.cpus directly)
# instead of sweeping processes out of them, so nothing needs to be listed
# here to be protected — everything that already has its own cgroup is
# left untouched by construction. Kept only so old config files don't warn.
CCD_PROTECTED_CGROUPS=elogind openrc.dbus

# Safety net: process NAMES (pgrep -x match) that must never be swept even
# if found sitting directly in the root cgroup (the only case the current
# architecture still moves processes — stray/unhomed processes). Covers
# both OpenRC and systemd daemon names so this list works unchanged across
# init systems. Added after an incident where a login-session process was
# moved out of its cgroup during CCD isolation, which broke D-Bus/PolicyKit's
# active-session tracking — this made polkit-gated tools (e.g. power-manager
# GUIs) fail with "Not authorized", and even corrupted TTY/session state,
# requiring a reboot.
CCD_PROTECTED_PROCS=elogind elogind-daemon systemd-logind dbus-daemon dbus-broker polkitd openrc-user login gdm gdm3 sddm lightdm

# Launcher process name to search for with pgrep -x. "steam" for Steam,
# "heroic" for Heroic, "bottles" for Bottles, etc.
CCD_LAUNCHER=lutris

# Extra process names to add to the theGood (performance) group, space-separated.
# Example: CCD_EXTRA_GOOD_PROCS=gamescope picom
CCD_EXTRA_GOOD_PROCS="wine wineserver wine64-preloader proton gamescope"

# How many seconds to keep scanning for newly spawned child processes
# (shader compilation, DXVK/VKD3D workers) after the launcher is moved.
# 0 = one-shot move only.
CCD_MONITOR_SECONDS=30

# cpuset.cpus.partition type: "root" (allows housekeeping) or "isolated"
# (more aggressive isolation). If you want to reduce jitter you can try
# "isolated" for theGood — it may cause stability issues on some systems.
CCD_GOOD_PARTITION_TYPE=root
CCD_UGLY_PARTITION_TYPE=root

# --- Transparent HugePage ---
# Bellek fragmantasyonunu ve ani gecikmeleri önlemek için her zaman (always)
# yerine uygulamanın talep etmesine (madvise) izin verilir.
THP_ENABLED=madvise
THP_SHMEM_ENABLED=madvise
THP_DEFRAG=madvise
